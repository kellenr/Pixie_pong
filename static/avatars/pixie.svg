<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>

  <!-- Glow effect -->
  <circle cx="60" cy="60" r="40" fill="url(#glow)" opacity="0.3"/>

  <!-- Body -->
  <ellipse cx="60" cy="72" rx="18" ry="22" fill="#a78bfa"/>

  <!-- Head -->
  <circle cx="60" cy="45" r="18" fill="#c4b5fd"/>

  <!-- Eyes -->
  <ellipse cx="52" cy="43" rx="4" ry="4.5" fill="#1a1a2e"/>
  <ellipse cx="68" cy="43" rx="4" ry="4.5" fill="#1a1a2e"/>
  <circle cx="53.5" cy="41.5" r="1.5" fill="white"/>
  <circle cx="69.5" cy="41.5" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M52 52 Q60 58 68 52" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Wings -->
  <path d="M38 55 Q20 35 35 25 Q42 30 42 50" fill="#7c3aed" opacity="0.6"/>
  <path d="M82 55 Q100 35 85 25 Q78 30 78 50" fill="#7c3aed" opacity="0.6"/>

  <!-- Small wings -->
  <path d="M40 65 Q25 55 32 45 Q38 50 42 60" fill="#7c3aed" opacity="0.4"/>
  <path d="M80 65 Q95 55 88 45 Q82 50 78 60" fill="#7c3aed" opacity="0.4"/>

  <!-- Antenna / sparkle -->
  <line x1="60" y1="27" x2="60" y2="18" stroke="#e9d5ff" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="60" cy="16" r="2.5" fill="#fbbf24"/>

  <!-- Star sparkles -->
  <path d="M25 70 l2-2 2 2-2 2z" fill="#fbbf24" opacity="0.7"/>
  <path d="M92 38 l2-2 2 2-2 2z" fill="#fbbf24" opacity="0.7"/>
  <path d="M45 20 l1.5-1.5 1.5 1.5-1.5 1.5z" fill="#e9d5ff" opacity="0.5"/>

  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
</svg>
