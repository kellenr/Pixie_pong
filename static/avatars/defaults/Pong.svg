<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#1a1025"/>
  <!-- Paddle left -->
  <rect x="10" y="18" width="5" height="28" rx="2" fill="#ff6b9d"/>
  <rect x="11" y="20" width="3" height="24" rx="1" fill="#ff8fba"/>
  <!-- Paddle right -->
  <rect x="49" y="18" width="5" height="28" rx="2" fill="#c084fc"/>
  <rect x="50" y="20" width="3" height="24" rx="1" fill="#d8b4fe"/>
  <!-- Ball trail -->
  <circle cx="22" cy="32" r="2" fill="#fbbf24" opacity="0.2"/>
  <circle cx="27" cy="30" r="2.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="32" cy="32" r="3" fill="#fbbf24" opacity="0.5"/>
  <!-- Ball -->
  <circle cx="38" cy="28" r="5" fill="#fbbf24"/>
  <circle cx="36.5" cy="26.5" r="2" fill="#fde68a"/>
  <!-- Center line -->
  <line x1="32" y1="6" x2="32" y2="10" stroke="#4b5563" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="32" y1="54" x2="32" y2="58" stroke="#4b5563" stroke-width="1" stroke-dasharray="2 2"/>
  <!-- Score -->
  <text x="24" y="12" font-family="monospace" font-size="8" fill="#ff6b9d" font-weight="bold">5</text>
  <text x="38" y="12" font-family="monospace" font-size="8" fill="#c084fc" font-weight="bold">3</text>
  <!-- Crown on winning score -->
  <polygon points="22,3 23.5,1 25,3 26.5,1 28,3" fill="#fbbf24"/>
  <!-- Stars -->
  <circle cx="20" cy="48" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="44" cy="50" r="1.2" fill="#ff6b9d" opacity="0.5"/>
  <circle cx="32" cy="52" r="0.8" fill="#c084fc" opacity="0.4"/>
  <!-- PONG text -->
  <text x="19" y="60" font-family="monospace" font-size="7" fill="#6b7280" letter-spacing="4">PONG</text>
</svg>