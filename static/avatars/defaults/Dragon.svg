<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#1a1025"/>
  <!-- Horns -->
  <polygon points="18,10 14,0 22,8" fill="#fbbf24"/>
  <polygon points="46,10 50,0 42,8" fill="#fbbf24"/>
  <!-- Head -->
  <ellipse cx="32" cy="26" rx="18" ry="16" fill="#dc2626"/>
  <ellipse cx="32" cy="28" rx="15" ry="13" fill="#ef4444"/>
  <!-- Snout -->
  <ellipse cx="32" cy="34" rx="10" ry="7" fill="#f87171"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="24" rx="4" ry="5" fill="#fbbf24"/>
  <ellipse cx="40" cy="24" rx="4" ry="5" fill="#fbbf24"/>
  <ellipse cx="24" cy="24" rx="2" ry="4" fill="#1a1025"/>
  <ellipse cx="40" cy="24" rx="2" ry="4" fill="#1a1025"/>
  <!-- Nostrils -->
  <circle cx="28" cy="33" r="2" fill="#991b1b"/>
  <circle cx="36" cy="33" r="2" fill="#991b1b"/>
  <!-- Teeth -->
  <polygon points="26,38 28,42 30,38" fill="white"/>
  <polygon points="34,38 36,42 38,38" fill="white"/>
  <!-- Smoke puffs -->
  <circle cx="22" cy="40" r="2" fill="#9ca3af" opacity="0.3"/>
  <circle cx="42" cy="41" r="2.5" fill="#9ca3af" opacity="0.25"/>
  <circle cx="18" cy="44" r="1.5" fill="#9ca3af" opacity="0.2"/>
  <!-- Body -->
  <ellipse cx="32" cy="52" rx="12" ry="10" fill="#dc2626"/>
  <!-- Belly -->
  <ellipse cx="32" cy="53" rx="8" ry="7" fill="#fbbf24" opacity="0.4"/>
  <!-- Scales -->
  <circle cx="32" cy="8" r="2.5" fill="#b91c1c"/>
  <circle cx="32" cy="4" r="2" fill="#b91c1c"/>
</svg>