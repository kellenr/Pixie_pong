<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#1a1025"/>
  <!-- Head wrap -->
  <ellipse cx="32" cy="26" rx="18" ry="17" fill="#374151"/>
  <ellipse cx="32" cy="26" rx="16" ry="15" fill="#4b5563"/>
  <!-- Eye band opening -->
  <rect x="14" y="20" width="36" height="12" rx="3" fill="#1f2937"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="26" rx="5" ry="3" fill="white"/>
  <ellipse cx="40" cy="26" rx="5" ry="3" fill="white"/>
  <circle cx="25" cy="26" r="2" fill="#1a1025"/>
  <circle cx="41" cy="26" r="2" fill="#1a1025"/>
  <circle cx="25.5" cy="25.2" r="0.8" fill="white"/>
  <circle cx="41.5" cy="25.2" r="0.8" fill="white"/>
  <!-- Headband -->
  <rect x="12" y="18" width="40" height="3" rx="1" fill="#ff6b9d"/>
  <!-- Headband knot (side) -->
  <rect x="50" y="16" width="6" height="3" rx="1" fill="#ff6b9d" transform="rotate(20 53 17)"/>
  <rect x="50" y="20" width="8" height="3" rx="1" fill="#ff6b9d" transform="rotate(-15 54 21)"/>
  <!-- Body -->
  <rect x="20" y="42" width="24" height="16" rx="6" fill="#374151"/>
  <rect x="24" y="44" width="16" height="12" rx="4" fill="#4b5563"/>
  <!-- Belt -->
  <rect x="20" y="48" width="24" height="3" rx="1" fill="#1f2937"/>
  <!-- Star on belt -->
  <polygon points="32,48 33,50 35,50 33.5,51.2 34,53 32,51.8 30,53 30.5,51.2 29,50 31,50" fill="#ff6b9d"/>
</svg>